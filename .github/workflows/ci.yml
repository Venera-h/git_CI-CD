# Учебный CI: проверка синтаксиса и импорта Python-приложения

name: CI

# Когда запускать: при push и PR в ветку main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    name: Syntax and import check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres

    steps:
      - uses: actions/checkout@v4
      # --- Python ---
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      # --- Проверки ---
      - run: python -m py_compile main.py
      - run: python -c "import main; print('imported OK')"
      - name: Init PostgreSQL
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres -f init_db.sql

      # - name: Run tests
      #   run: | 
      #     pytest -v test_main.py; ruff check . --fix
